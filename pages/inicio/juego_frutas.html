<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Juego de Memoria</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-black flex items-center justify-center min-h-screen">

  <!-- Botón abrir -->
  <button id="abrirModal" class="bg-red-600 hover:bg-red-700 text-white px-6 py-2 rounded-lg font-bold">
    Jugar Memoria
  </button>

  <!-- Modal -->
  <div id="modal" class="fixed inset-0 bg-black bg-opacity-80 hidden items-center justify-center">
    <div class="bg-zinc-900 p-6 rounded-xl w-96 relative border border-red-600">

      <h2 class="text-xl font-bold text-center mb-4 text-red-600">
        Juego de Memoria
      </h2>

      <!-- Cerrar -->
      <button id="cerrarModal" class="absolute top-2 right-3 text-red-600 text-2xl">
        &times;
      </button>

      <!-- Tablero -->
      <div id="tablero" class="grid grid-cols-4 gap-3"></div>

      <!-- Reiniciar -->
      <button id="reiniciar" class="mt-4 w-full bg-red-600 hover:bg-red-700 text-white py-2 rounded-lg font-semibold">
        Reiniciar
      </button>

    </div>
  </div>

<script src="../../js/juego_frutas.js"></script>

</body>
</html>
