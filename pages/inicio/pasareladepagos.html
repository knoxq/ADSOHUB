<!DOCTYPE html>
<html lang="es">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ADSOHUB | Planes</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
  <link rel="icon" type="image/x-icon" href="/assets/icons/favicon.ico">
  <link rel="stylesheet" href="../../css/index.css">
</head>

<body class="bg-black text-white">

  <!-- HEADER -->
  <header class="navbar-glass fixed-top px-4 py-2">
    <div class="d-flex align-items-center gap-2">
      <a href="/pages/inicio/index.html" class="d-flex align-items-center gap-2 text-decoration-none">
        <img src="/assets/icons/favicon.ico" class="nav-logo">
        <h1 class="h5 fw-bold mb-0 d-none d-sm-block text-adso-red">ADSO<span class="fst-italic text-white">HUB</span></h1>
      </a>
    </div>
  </header>

  <!-- PLANES -->
  <section class="bg-black planes-section pb-5 px-3 px-md-5 text-center">
    <h2 class="fw-bold fs-2 mb-5 pt-4">
      Planes y <span class="text-adso-red">precios</span>
    </h2>

    <div class="row g-4 justify-content-center">

      <div class="col-12 col-md-4">
        <div class="plan-card h-100 d-flex flex-column text-start">
          <h3 class="fs-4 fw-bold mb-3">Básico</h3>
          <p class="fs-1 fw-bold mb-4">$15.000<span class="text-gray-500 fs-5">/mes</span></p>
          <ul class="list-unstyled flex-grow-1 mb-4">
            <li class="d-flex align-items-center gap-2 mb-2"><span class="text-adso-red">✓</span> HD streaming</li>
            <li class="d-flex align-items-center gap-2 mb-2"><span class="text-adso-red">✓</span> 2 pantallas</li>
            <li class="d-flex align-items-center gap-2 mb-2"><span class="text-gray-500">✗</span> Sin descargas</li>
          </ul>
          <a href="../UI/forms/register.html"
             onclick="abrirFormulario('Básico', 15000)"
             class="btn btn-adso w-100 py-2 fw-bold">Elegir plan</a>
        </div>
      </div>

      <div class="col-12 col-md-4">
        <div class="plan-card h-100 d-flex flex-column text-start">
          <h3 class="fs-4 fw-bold mb-3">Estándar</h3>
          <p class="fs-1 fw-bold mb-4">$25.000<span class="text-gray-500 fs-5">/mes</span></p>
          <ul class="list-unstyled flex-grow-1 mb-4">
            <li class="d-flex align-items-center gap-2 mb-2"><span class="text-adso-red">✓</span> Full HD</li>
            <li class="d-flex align-items-center gap-2 mb-2"><span class="text-adso-red">✓</span> 4 pantallas</li>
            <li class="d-flex align-items-center gap-2 mb-2"><span class="text-adso-red">✓</span> Descargas</li>
          </ul>
          <a href="../UI/forms/register.html"
             onclick="abrirFormulario('Estándar', 25000)"
             class="btn btn-adso w-100 py-2 fw-bold">Elegir plan</a>
        </div>
      </div>

      <div class="col-12 col-md-4">
        <div class="plan-card h-100 d-flex flex-column text-start">
          <h3 class="fs-4 fw-bold mb-3">Premium</h3>
          <p class="fs-1 fw-bold mb-4">$35.000<span class="text-gray-500 fs-5">/mes</span></p>
          <ul class="list-unstyled flex-grow-1 mb-4">
            <li class="d-flex align-items-center gap-2 mb-2"><span class="text-adso-red">✓</span> 4K</li>
            <li class="d-flex align-items-center gap-2 mb-2"><span class="text-adso-red">✓</span> 6 pantallas</li>
            <li class="d-flex align-items-center gap-2 mb-2"><span class="text-adso-red">✓</span> Descargas</li>
          </ul>
          <a href="../UI/forms/register.html"
             onclick="abrirFormulario('Premium', 35000)"
             class="btn btn-adso w-100 py-2 fw-bold">Elegir plan</a>
        </div>
      </div>

    </div>
  </section>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js" integrity="sha384-YvpcrYf0tY3lHB60NNkmxc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz" crossorigin="anonymous"></script>
  <script src="../../js/pagos.js"></script>
</body>

</html>
