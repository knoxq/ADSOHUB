<!doctype html>
<html lang="es">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ADSO HUB - Inicio</title>

    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

    <link rel="icon" type="image/x-icon" href="/assets/icons/favicon.ico">

    <link rel="stylesheet" href="/css/UI/catalog.css">
</head>

<body>

    <!-- ================= HEADER ================= -->
    <header class="p-4 bg-black">
        <div class="container-fluid px-0 px-md-3 d-flex justify-content-between align-items-center">

            <!-- LOGO MOBILE -->
            <button class="btn btn-link text-decoration-none d-flex align-items-center p-0 d-md-none border-0"
                data-bs-toggle="offcanvas" data-bs-target="#mobileMenu">
                <img src="/assets/icons/favicon.ico" class="hover-scale" style="width: 50px; height: 50px;">
            </button>

            <!-- LOGO DESKTOP -->
            <div class="d-none d-md-flex align-items-center gap-3 text-red-custom">
                <a href="/pages/UI/catalog/catalog.html">
                    <img src="/assets/icons/favicon.ico" class="hover-scale" style="width: 56px; height: 56px;">
                </a>
                <h1 class="h4 mb-0 fw-bold">ADSO<span class="fst-italic text-white">HUB</span></h1>
            </div>

            <!-- NAV -->
            <nav class="d-none d-md-flex gap-4">
                <a href="/pages/UI/catalog/catalog.html"
                    class="text-white text-decoration-none text-red-custom-hover fw-medium">Inicio</a>
                <a href="/pages/UI/catalog/secciones/Series.html"
                    class="text-white text-decoration-none text-red-custom-hover fw-medium">Series</a>
                <a href="/pages/UI/catalog/secciones/Movies.html"
                    class="text-white text-decoration-none text-red-custom-hover fw-medium">Películas</a>
                <a href="/pages/UI/catalog/secciones/Games.html"
                    class="text-white text-decoration-none text-red-custom-hover fw-medium">Juegos</a>
                <a href="/pages/UI/forms/login.html"
                    class="text-white text-decoration-none text-red-custom-hover fw-medium">Cerrar Sesión</a>
            </nav>

            <!-- SEARCH -->
            <div class="d-flex align-items-center">
                <input type="text" class="form-control rounded-pill search-input px-3 py-2" placeholder="🔍 Buscar"
                    id="searchMultimedia">
            </div>

        </div>
    </header>

    <!-- ================= MOBILE MENU (OFFCANVAS) ================= -->
    <div class="offcanvas offcanvas-start bg-dark text-white border-0" tabindex="-1" id="mobileMenu">
        <div class="offcanvas-header border-bottom border-secondary">
            <div class="d-flex align-items-center gap-3 text-red-custom">
                <img src="/assets/icons/favicon.ico" style="width: 48px; height: 48px;">
                <h5 class="offcanvas-title fw-bold">ADSO<span class="fst-italic text-white">HUB</span></h5>
            </div>
            <button type="button" class="btn-close btn-close-white" data-bs-dismiss="offcanvas"
                aria-label="Close"></button>
        </div>
        <div class="offcanvas-body">
            <nav class="nav flex-column gap-3 fs-5 mt-3">
                <a href="/pages/UI/catalog/catalog.html"
                    class="nav-link text-white px-0 text-red-custom-hover">Inicio</a>
                <a href="/pages/UI/catalog/secciones/Series.html"
                    class="nav-link text-white px-0 text-red-custom-hover">Series</a>
                <a href="/pages/UI/catalog/secciones/Movies.html"
                    class="nav-link text-white px-0 text-red-custom-hover">Películas</a>
                <a href="/pages/UI/catalog/secciones/Games.html"
                    class="nav-link text-white px-0 text-red-custom-hover">Juegos</a>
                <a href="/pages/UI/forms/login.html"
                    class="nav-link text-danger px-0 mt-4 border-top border-secondary pt-4">Cerrar Sesión</a>
            </nav>
        </div>
    </div>

    <!-- ================= MAIN ================= -->
    <main class="container-fluid px-3 px-md-5 mt-4 mb-5 pb-4">

        <!-- HERO -->
        <section class="mb-5">
            <div class="hero-banner p-4 p-md-5">
                <div class="hero-banner-bg"></div>
                <div class="hero-banner-overlay"></div>

                <div class="position-relative z-1 d-flex justify-content-between align-items-center w-100 h-100">
                    <div class="text-start" style="max-width: 600px;">
                        <h2 class="display-5 fw-bold text-white mb-3">Bienvenido a ADSOHUB</h2>
                        <p class="fs-5" style="color: #ccc;">
                            Disfruta películas y series populares, actualizadas y organizadas.
                        </p>
                    </div>
                    <img src="/assets/img/BG-Catalog-1.jpg"
                        class="d-none d-md-block rounded shadow-lg position-relative z-1" style="max-width: 300px;">
                </div>
            </div>
        </section>

        <!-- ================= CATALOG ================= -->
        <section id="catalogo">

            <!-- ===== MOVIES ===== -->
            <section class="mb-5">
                <h2 class="h3 fw-bold mb-4">Películas</h2>
                <div class="catalog-scroll" id="movies-card">
                    <!-- Javascript populates this -->
                </div>
            </section>

            <!-- ===== SERIES ===== -->
            <section class="mb-5">
                <h2 class="h3 fw-bold mb-4">Series</h2>
                <div class="catalog-scroll" id="series-card">
                    <!-- Javascript populates this -->
                </div>
            </section>

        </section>

    </main>

    <!-- FOOTER -->
    <footer class="bg-dark text-white text-center py-3 position-fixed bottom-0 w-100 border-top border-secondary"
        style="z-index: 1020;">
        <div class="container">
            <span class="text-white-50">© 2026 ADSOHUB. Todos los derechos reservados.</span>
        </div>
    </footer>

    <!-- MODAL BOOTSTRAP -->
    <div class="modal fade" id="movie-modal" tabindex="-1" aria-hidden="true">
        <div class="modal-dialog modal-xl modal-dialog-centered">
            <div class="modal-content bg-dark text-white border-0 rounded-3 overflow-hidden">

                <!-- MEDIA -->
                <div class="position-relative bg-black d-flex align-items-center justify-content-center"
                    style="height: 60vh;">
                    <iframe id="modal-trailer" class="w-100 h-100 d-none" frameborder="0"
                        allow="autoplay; encrypted-media" allowfullscreen></iframe>
                    <div id="modal-backdrop"></div>

                    <button type="button" id="close-modal-btn"
                        class="btn-close btn-close-white position-absolute top-0 end-0 m-3 z-3" data-bs-dismiss="modal"
                        aria-label="Close"
                        style="background-color: rgba(0,0,0,0.6); padding: 12px; border-radius: 50%; opacity: 0.8;"></button>
                </div>

                <!-- CONTENT -->
                <div class="p-4 p-md-5 position-relative z-1" style="background-color: #212529;">
                    <h2 id="modal-title" class="display-6 fw-bold mb-3"></h2>
                    <p id="modal-description" class="fs-5 text-light"></p>
                </div>
            </div>
        </div>
    </div>

    <!-- ================= SCRIPTS ================= -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script type="module" src="/js/catalog/main.js"></script>

</body>

</html>
