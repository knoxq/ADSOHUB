<!doctype html>
<html lang="es">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ADSO HUB - Series</title>

    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

    <link rel="icon" type="image/x-icon" href="/assets/icons/favicon.ico">

    <link rel="stylesheet" href="/css/UI/catalog.css">
</head>

<body>

    <!-- ================= HEADER ================= -->
    <header class="p-4 bg-black">
        <div class="container-fluid px-0 px-md-3 d-flex justify-content-between align-items-center">

            <button class="btn btn-link text-decoration-none d-flex align-items-center p-0 d-md-none border-0"
                data-bs-toggle="offcanvas" data-bs-target="#mobileMenu">
                <img src="/assets/icons/favicon.ico" class="hover-scale logo-mobile">
            </button>

            <div class="d-none d-md-flex align-items-center gap-3 text-red-custom">
                <a href="/pages/UI/catalog/catalog.html">
                    <img src="/assets/icons/favicon.ico" class="hover-scale logo-desktop">
                </a>
                <h1 class="h4 mb-0 fw-bold">ADSO<span class="fst-italic text-white">HUB</span></h1>
            </div>

            <nav class="d-none d-md-flex gap-4">
                <a href="/pages/UI/catalog/catalog.html"
                    class="text-white text-decoration-none text-red-custom-hover fw-medium">Inicio</a>
                <a href="/pages/UI/catalog/secciones/Series.html"
                    class="text-white text-decoration-none text-red-custom-hover fw-medium">Series</a>
                <a href="/pages/UI/catalog/secciones/Movies.html"
                    class="text-white text-decoration-none text-red-custom-hover fw-medium">Películas</a>
                <a href="/pages/inicio/index.html"
                    class="text-white text-decoration-none text-red-custom-hover fw-medium">Cerrar Sesión</a>
            </nav>

            <div class="d-flex align-items-center">
                <input type="text" class="form-control rounded-pill search-input px-3 py-2" placeholder="🔍 Buscar"
                    id="searchSeries">
            </div>

        </div>
    </header>

    <!-- ================= MOBILE MENU (OFFCANVAS) ================= -->
    <div class="offcanvas offcanvas-start bg-dark text-white border-0" tabindex="-1" id="mobileMenu">
        <div class="offcanvas-header border-bottom border-secondary">
            <div class="d-flex align-items-center gap-3 text-red-custom">
                <img src="/assets/icons/favicon.ico" class="logo-offcanvas">
                <h5 class="offcanvas-title fw-bold">ADSO<span class="fst-italic text-white">HUB</span></h5>
            </div>
            <button type="button" class="btn-close btn-close-white" data-bs-dismiss="offcanvas"
                aria-label="Close"></button>
        </div>
        <div class="offcanvas-body">
            <nav class="nav flex-column gap-3 fs-5 mt-3">
                <a href="/pages/UI/catalog/catalog.html"
                    class="nav-link text-white px-0 text-red-custom-hover">Inicio</a>
                <a href="/pages/UI/catalog/secciones/Series.html"
                    class="nav-link text-white px-0 text-red-custom-hover">Series</a>
                <a href="/pages/UI/catalog/secciones/Movies.html"
                    class="nav-link text-white px-0 text-red-custom-hover">Películas</a>
                <a href="/pages/inicio/index.html"
                    class="nav-link text-danger px-0 mt-4 border-top border-secondary pt-4">Cerrar Sesión</a>
            </nav>
        </div>
    </div>

    <!-- MAIN CONTENT -->
    <main class="container-fluid px-4 py-4 mb-5">
        <h2 class="h3 fw-bold mb-4">Series Populares</h2>
        <div id="series-card" class="row row-cols-2 row-cols-sm-3 row-cols-md-4 row-cols-lg-6 g-4">
            <!-- JS Inject -->
        </div>
    </main>

    <!-- FOOTER -->
    <footer class="bg-dark text-white text-center py-3 position-fixed bottom-0 w-100 border-top border-secondary z-fixed">
        <div class="container">
            <span class="text-white-50">© 2026 ADSOHUB. Todos los derechos reservados.</span>
        </div>
    </footer>

    <!-- MODAL BOOTSTRAP -->
    <div class="modal fade" id="movie-modal" tabindex="-1" aria-hidden="true">
        <div class="modal-dialog modal-xl modal-dialog-centered">
            <div class="modal-content bg-dark text-white border-0 rounded-3 overflow-hidden">

                <div class="position-relative bg-black d-flex align-items-center justify-content-center modal-media-container">
                    <iframe id="modal-trailer" class="w-100 h-100 d-none" frameborder="0"
                        allow="autoplay; encrypted-media" allowfullscreen></iframe>
                    <div id="modal-backdrop"></div>

                    <button type="button" id="close-modal-btn"
                        class="btn-close btn-close-white position-absolute top-0 end-0 m-3 z-3 modal-close-btn" data-bs-dismiss="modal"
                        aria-label="Close"></button>
                </div>

                <div class="p-4 p-md-5 position-relative z-1 modal-content-custom">
                    <h2 id="modal-title" class="display-6 fw-bold mb-3"></h2>
                    <p id="modal-description" class="fs-5 text-light"></p>
                </div>
            </div>
        </div>
    </div>

    <!-- ================= SCRIPTS ================= -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script type="module" src="/js/catalog/secciones/Series/main.js"></script>

</body>

</html>
