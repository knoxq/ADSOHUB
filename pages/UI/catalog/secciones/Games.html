<!doctype html>
<html lang="es">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ADSO HUB - Juegos</title>

    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

    <link rel="icon" type="image/x-icon" href="/assets/icons/favicon.ico">

    <link rel="stylesheet" href="/css/UI/catalog.css">
</head>

<body>

    <!-- ================= HEADER ================= -->
    <header class="p-4 bg-black">
        <div class="container-fluid px-0 px-md-3 d-flex justify-content-between align-items-center">

            <button class="btn btn-link text-decoration-none d-flex align-items-center p-0 d-md-none border-0"
                data-bs-toggle="offcanvas" data-bs-target="#mobileMenu">
                <img src="/assets/icons/favicon.ico" class="hover-scale" style="width: 50px; height: 50px;">
            </button>

            <div class="d-none d-md-flex align-items-center gap-3 text-red-custom">
                <a href="/pages/UI/catalog/catalog.html">
                    <img src="/assets/icons/favicon.ico" class="hover-scale" style="width: 56px; height: 56px;">
                </a>
                <h1 class="h4 mb-0 fw-bold">ADSO<span class="fst-italic text-white">HUB</span></h1>
            </div>

            <nav class="d-none d-md-flex gap-4">
                <a href="/pages/UI/catalog/catalog.html"
                    class="text-white text-decoration-none text-red-custom-hover fw-medium">Inicio</a>
                <a href="/pages/UI/catalog/secciones/Series.html"
                    class="text-white text-decoration-none text-red-custom-hover fw-medium">Series</a>
                <a href="/pages/UI/catalog/secciones/Movies.html"
                    class="text-white text-decoration-none text-red-custom-hover fw-medium">Películas</a>
                <a href="/pages/UI/catalog/secciones/Games.html"
                    class="text-white text-decoration-none text-red-custom-hover fw-medium">Juegos</a>
                <a href="/pages/UI/forms/login.html"
                    class="text-white text-decoration-none text-red-custom-hover fw-medium">Cerrar Sesión</a>
            </nav>

            <div class="d-flex align-items-center">
                <input type="text" class="form-control rounded-pill search-input px-3 py-2" placeholder="🔍 Buscar">
            </div>

        </div>
    </header>

    <!-- ================= MOBILE MENU (OFFCANVAS) ================= -->
    <div class="offcanvas offcanvas-start bg-dark text-white border-0" tabindex="-1" id="mobileMenu">
        <div class="offcanvas-header border-bottom border-secondary">
            <div class="d-flex align-items-center gap-3 text-red-custom">
                <img src="/assets/icons/favicon.ico" style="width: 48px; height: 48px;">
                <h5 class="offcanvas-title fw-bold">ADSO<span class="fst-italic text-white">HUB</span></h5>
            </div>
            <button type="button" class="btn-close btn-close-white" data-bs-dismiss="offcanvas"
                aria-label="Close"></button>
        </div>
        <div class="offcanvas-body">
            <nav class="nav flex-column gap-3 fs-5 mt-3">
                <a href="/pages/UI/catalog/catalog.html"
                    class="nav-link text-white px-0 text-red-custom-hover">Inicio</a>
                <a href="/pages/UI/catalog/secciones/Series.html"
                    class="nav-link text-white px-0 text-red-custom-hover">Series</a>
                <a href="/pages/UI/catalog/secciones/Movies.html"
                    class="nav-link text-white px-0 text-red-custom-hover">Películas</a>
                <a href="/pages/UI/catalog/secciones/Games.html"
                    class="nav-link text-white px-0 text-red-custom-hover">Juegos</a>
                <a href="/pages/UI/forms/login.html"
                    class="nav-link text-danger px-0 mt-4 border-top border-secondary pt-4">Cerrar Sesión</a>
            </nav>
        </div>
    </div>

    <!-- MAIN CONTENT -->
    <main class="container-fluid px-4 py-4 mb-5 text-center">
        <h2 class="h3 fw-bold mb-4">Próximamente: Juegos</h2>
        <p class="text-muted">Sección en construcción</p>
    </main>

    <!-- FOOTER -->
    <footer class="bg-dark text-white text-center py-3 position-fixed bottom-0 w-100 border-top border-secondary"
        style="z-index: 1020;">
        <div class="container">
            <span class="text-white-50">© 2026 ADSOHUB. Todos los derechos reservados.</span>
        </div>
    </footer>

    <!-- ================= SCRIPTS ================= -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

</body>

</html>
