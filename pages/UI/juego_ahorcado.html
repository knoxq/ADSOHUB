<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ahorcado</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="http://fonts.cdnfonts.com/css/sf-pixelate" rel="stylesheet">
</head>
<body class="bg-black text-white min-h-screen flex items-center justify-center font-[SF_Pixelate]">
    <!-- Botón para abrir el juego -->
    <button id="abrirModal"
        class="bg-red-600 hover:bg-red-700 px-8 py-4 rounded-2xl shadow-xl transition transform hover:scale-105 active:scale-95 font-bold text-xl">
        Jugar Ahorcado
    </button>
    <!--modal del juego -->
    <div id="modal" class="fixed inset-0 bg-black bg-opacity-80 hidden items-center justify-center z-50">
        <!-- Contenedor del juego -->
        <div id="contenedor" class="bg-zinc-900 w-full min-h-screen p-8 border border-red-700 relative">
            <!-- Botón cerrar -->
            <button id="cerrarModal" class="absolute top-4 right-4 text-white text-xl hover:text-red-500 transition">
                ✖
            </button>
            <h1 class="text-4xl text-center mb-8 text-red-600 tracking-widest">
                Ahorcado Pixel
            </h1>
            <div class="grid grid-cols-3 gap-6">
                <div class="flex flex-col items-center">
                    <button id="verPista"class="bg-red-600 hover:bg-red-700 text-white px-6 py-2 rounded-xl font-bold">
                        Ver Pista
                    </button>
                    <div id="pistas"
                        class="mt-6 w-full text-sm text-white-400 bg-black p-4 rounded-xl border border-red-600 space-y-3 hidden">
                    </div>
                </div>
                <div class="flex flex-col items-center justify-center">
                    <div id="letras" class="grid grid-cols-7 gap-3 text-lg text-red-500">
                    </div>
                    <div id="palbras" class="mt-8 text-3xl tracking-widest text-red-500 text-center">
                    </div>
                </div>
                <div class="flex flex-col items-center">
                    <div class="bg-black p-4 rounded-xl shadow-lg border border-red-700">
                        <canvas id="canvas" width="250" height="300"
                            class="border-4 border-red-600 rounded-lg"></canvas>
                    </div>
                    <!-- INFO DEBAJO DEL AHORCADO -->
                    <div class="mt-6 text-red-500 text-lg text-center">
                        <p><strong>Vidas:</strong> <span id="vidas"></span></p>
                        <p class="mt-2"><strong>Letras usadas:</strong></p>
                        <p id="usadas" class="mt-1 break-words"></p>
                    </div>
                </div>
            </div>
            <div class="text-center mt-10">
                <button id="inicio" class="bg-red-600 hover:bg-red-700 text-white px-6 py-3 rounded-xl font-bold">
                    Iniciar Juego
                </button>
            </div>
        </div>
        <!-- mi script del juego -->
        <script src="../../js/juego_ahorcado.js" defer></script>
</body>

</html>
