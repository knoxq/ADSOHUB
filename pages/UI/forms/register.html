<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <title>Regístrate</title>
    <link rel="icon" type="image/x-icon" href="/assets/icons/favicon.ico">
</head>
<body class="bg-dark text-light vh-100 overflow-hidden">

    <div class="container-fluid p-0 h-100">
        <div class="row g-0 h-100">

            <!-- Mitad izquierda (Imagen) -->
            <div class="col-md-7 col-lg-8 d-none d-md-block h-100">
                <img src="/assets/img/bg-6.jpg" alt="Imagen Registro" class="w-100 h-100 object-fit-cover">
            </div>

            <!-- Mitad derecha (Formulario) -->
            <div class="col-md-5 col-lg-4 bg-black h-100 overflow-y-auto px-4 px-md-5 d-flex flex-column">
                <div class="w-100 my-auto pb-4 mt-md-auto mt-5 pt-3">
                    <div class="text-center mb-4">
                        <h1 class="h4 fw-bold text-white">
                            Crear cuenta en <span class="text-danger">ADSO</span><span class="fst-italic text-white">HUB</span>
                        </h1>
                        <p class="text-secondary small mt-2">
                            Regístrate para comenzar
                        </p>
                    </div>

                    <!-- Formulario -->
                    <form id="registro" class="d-grid gap-3">
                        <div>
                            <label class="form-label text-secondary small mb-1">
                                Nombre completo
                            </label>
                            <input id="nombre" type="text" placeholder="Juan Pérez" class="form-control bg-dark border-secondary text-white shadow-none" required>
                            <span id="err-nombre" class="error text-danger small"></span>            
                        </div>

                        <div>
                            <label class="form-label text-secondary small mb-1">
                                Correo electrónico
                            </label>
                            <input id="correo" type="email" placeholder="correo@ejemplo.com" class="form-control bg-dark border-secondary text-white shadow-none" required>
                            <span id="err-correo" class="error text-danger small"></span>            
                        </div>

                        <div>
                            <label class="form-label text-secondary small mb-1">
                                Contraseña
                            </label>
                            <input id="contrasena" type="password" placeholder="••••••••" class="form-control bg-dark border-secondary text-white shadow-none" required>
                            <span id="err-contrasena" class="error text-danger small"></span>            
                        </div>

                        <div>
                            <label class="form-label text-secondary small mb-1">
                                Confirmar contraseña
                            </label>
                            <input id="confirmar" type="password" placeholder="••••••••" class="form-control bg-dark border-secondary text-white shadow-none" required>
                            <span id="err-confirmar" class="error text-danger small"></span>            
                        </div>

                        <div class="d-flex align-items-start gap-2 small text-secondary mt-1">
                            <div class="form-check m-0">
                                <input class="form-check-input bg-danger border-danger" type="checkbox" id="terminos" required>
                                <label class="form-check-label" for="terminos">
                                    Acepto los
                                    <a href="#" class="text-white text-decoration-none fw-bold">
                                        términos y condiciones
                                    </a>
                                </label>
                            </div>
                            <span id="err-terminos" class="error text-danger small ms-auto d-block"></span>
                        </div>

                        <button type="submit" class="btn btn-danger w-100 py-2 fw-semibold mt-2">
                            <a href="/pages/UI/catalog/catalog.html" class="text-white text-decoration-none d-block w-100">
                                Pasarela de Pagos
                            </a> 
                        </button>
                        <p id="form-error" class="text-danger small text-center m-0"></p>

                        <div class="text-center mt-4 small text-secondary">
                            Para volver a inicio dale a 
                            <a href="/pages/UI/index.html" class="text-white text-decoration-none fw-bold">
                                Regresar
                            </a>
                        </div>
                        
                        <div class="text-center mt-3 small text-secondary">
                            ¿Ya tienes cuenta?
                            <a href="/pages/UI/forms/login.html" class="text-white text-decoration-none fw-bold">
                                Inicia sesión
                            </a>
                        </div>
                    </form>
                </div>

                <!-- Derechos reservados -->
                <div class="mt-auto text-center py-3 text-secondary small border-top border-secondary">
                    <small>&copy; 2026 ADSOHUB. Todos los derechos reservados.</small>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js" integrity="sha384-YvpcrYf0tY3lHB60NNkmxc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz" crossorigin="anonymous"></script>
    <script src="/js/validate/validar_registro.js"></script>
</body>
</html>
