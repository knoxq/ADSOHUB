<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <title>Regístrate</title>
    <link rel="icon" type="image/x-icon" href="/assets/icons/favicon.ico">
</head>
<body class="bg-[url('/assets/img/bg-6.jpg')] bg-cover bg-center backdrop-blur-xl min-h-screen flex items-center justify-center">

    <div class="flex w-full max-w-5xl bg-zinc-950 rounded-xl overflow-hidden shadow-xl">

        <!-- Imagen -->
        <div class="hidden md:block w-1/2 ">
            <img src="/assets/img/bg-6.jpg" alt="Imagen Registro" class="w-full h-full object-cover">
        </div>

        <!-- Registro -->
        <section class="w-full md:w-1/2 p-8">

            <!-- Título -->
            <div class="text-center mb-8">
                <h1 class="text-2xl font-bold text-white">
                    Crear cuenta en <span class="text-red-600">ADSO</span><span class="italic">HUB</span>
                </h1>
                <p class="text-zinc-400 text-sm mt-2">
                    Regístrate para comenzar
                </p>
            </div>

            <!-- Formulario -->
            <form id="registro" class="space-y-5">

                <div>
                    <label class="block text-sm text-zinc-300 mb-1">
                        Nombre completo
                    </label>
                    <input id="nombre" type="text" placeholder="Juan Pérez" class="w-full px-4 py-3 rounded bg-gray-900 text-white
                                border border-zinc-700
                                focus:outline-none focus:border-red-600
                                transition-colors duration-300 caret-red-600" required>
                    <span id="err-nombre" class="error text-red-500 text-sm"></span>            
                </div>

                <div>
                    <label class="block text-sm text-zinc-300 mb-1">
                        Correo electrónico
                    </label>
                    <input id="correo" type="email" placeholder="correo@ejemplo.com" class="w-full px-4 py-3 rounded bg-gray-900 text-white
                                border border-zinc-700
                                focus:outline-none focus:border-red-600
                                transition-colors duration-300 caret-red-600" required>
                    <span id="err-correo" class="error text-red-500 text-sm"></span>            
                </div>

                <div>
                    <label class="block text-sm text-zinc-300 mb-1">
                        Contraseña
                    </label>
                    <input id="contrasena" type="password" placeholder="••••••••" class="w-full px-4 py-3 rounded bg-gray-900 text-white
                                border border-zinc-700
                                focus:outline-none focus:border-red-600
                                transition-colors duration-300 caret-red-600" required>
                    <span id="err-contrasena" class="error text-red-500 text-sm"></span>            
                </div>

                <div>
                    <label class="block text-sm text-zinc-300 mb-1">
                        Confirmar contraseña
                    </label>
                    <input id="confirmar" type="password" placeholder="••••••••" class="w-full px-4 py-3 rounded bg-gray-900 text-white
                                border border-zinc-700
                                focus:outline-none focus:border-red-600
                                transition-colors duration-300 caret-red-600" required>
                    <span id="err-confirmar" class="error text-red-500 text-sm"></span>            
                </div>

                <div class="flex items-center gap-2 text-sm text-zinc-400">
                    <label for="terminos">
                        Acepto los
                        <a href="#">
                            términos y condiciones
                        </a>
                    </label>
                    <input id="terminos" type="checkbox" class="accent-red-600" required>
                    <span id="err-terminos" class="error text-red-500 text-sm"></span>
                </div>

                <button type="submit" class="w-full bg-red-600 py-3 rounded font-semibold text-white
                            hover:bg-red-500 transition-colors duration-300">
                    <a href="/pages/UI/catalog/catalog.html">
                        Pasarela de Pagos
                    </a> 
                </button>
                <p id="form-error" class="text-red-500 text-sm text-center"></p>

                <div class="text-center mt-6 text-sm text-zinc-400">
                    Para volver a inicio dale a 
                    <a href="/pages/UI/index.html" class="text-white hover:text-red-600 transition-colors">
                        Regresar
                    </a>
                </div>
                
                <div class="text-center mt-6 text-sm text-zinc-400">
                    ¿Ya tienes cuenta?
                    <a href="/pages/UI/forms/login.html" class="text-white hover:text-red-600 transition-colors">
                        Inicia sesión
                    </a>
                </div>
            </form>
        </section>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@tailwindplus/elements@1" type="module"></script>
    <script src="/js/validate/validar_registro.js"></script>
</body>
</html>
